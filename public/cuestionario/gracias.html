<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Gracias — Grupo Alefant</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Inter', sans-serif;
    background: #f5f3f0;
    color: #2d2d2d;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .card {
    text-align: center;
    max-width: 520px;
    padding: 48px 32px;
    background: #fff;
    border-radius: 16px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    border: 1px solid #e8e4df;
    margin: 24px;
  }
  .check {
    width: 64px;
    height: 64px;
    background: #1a1a1a;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 24px;
  }
  .check svg { width: 32px; height: 32px; stroke: #fff; fill: none; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; }
  h1 { font-size: 24px; font-weight: 700; color: #1a1a1a; margin-bottom: 12px; }
  p { font-size: 15px; color: #6b6b6b; line-height: 1.6; margin-bottom: 8px; }
  .small { font-size: 13px; color: #aaa; margin-top: 24px; }
</style>
</head>
<body>
<div class="card">
  <div class="check">
    <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
  </div>
  <h1>Recibimos tus respuestas</h1>
  <p>Gracias por tomarte el tiempo de llenar el cuestionario. Tu informacion nos ayuda a entender tu negocio y crear algo que realmente lo represente.</p>
  <p>Nuestro equipo revisara tus respuestas y te contactaremos pronto.</p>
  <p class="small">Grupo Alefant &mdash; Construccion, remodelacion y diseno</p>
</div>
</body>
</html>
