<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Grupo Alefant — Construcción y Remodelación</title>
  <meta name="description" content="Construcción, remodelación y diseño arquitectónico en México. Calidad, cumplimiento y transparencia en cada proyecto.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --primary: #1B3049;
      --secondary: #3D5A80;
      --accent: #C9A96E;
      --neutral-light: #F0EDEA;
      --neutral-dark: #2C2C2C;
      --white: #FFFFFF;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--primary);
      color: var(--white);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
    }

    .container {
      max-width: 600px;
      padding: 2rem;
    }

    .logo-text {
      font-family: 'Archivo Black', sans-serif;
      font-size: 2.5rem;
      letter-spacing: 0.05em;
      margin-bottom: 0.25rem;
    }

    .logo-text span {
      font-family: 'Inter', sans-serif;
      font-weight: 300;
      font-size: 1.8rem;
      display: block;
      letter-spacing: 0.1em;
    }

    .divider {
      width: 60px;
      height: 3px;
      background: var(--accent);
      margin: 1.5rem auto;
    }

    p {
      font-size: 1.1rem;
      color: var(--neutral-light);
      line-height: 1.6;
      margin-bottom: 2rem;
    }

    .badge {
      display: inline-block;
      font-size: 0.85rem;
      font-weight: 500;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--accent);
      border: 1px solid var(--accent);
      padding: 0.5rem 1.5rem;
      border-radius: 2px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo-text">
      <span>GRUPO</span>
      ALEFANT
    </div>
    <div class="divider"></div>
    <p>Estamos preparando algo grande.<br>Construcción, remodelación y diseño arquitectónico.</p>
    <div class="badge">Próximamente</div>
  </div>
</body>
</html>
